<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TikCal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(34,197,94,0.18), transparent 35%),
        linear-gradient(135deg, #020617, #0f172a 55%, #03140b);
      color: white;
      text-align: center;
      padding: 24px;
    }

    .box {
      max-width: 430px;
      margin: 0 auto;
      padding: 28px 22px;
    }

    .logo {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .logo span {
      color: #7CFF5B;
    }

    h1 {
      font-size: 38px;
      line-height: 1.05;
      margin: 18px 0 12px;
      font-weight: 900;
    }

    .green {
      color: #7CFF5B;
    }

    p {
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.5;
    }

    .card {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(124, 255, 91, 0.22);
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      border-radius: 22px;
      padding: 22px;
      margin-top: 24px;
    }

    input[type="file"] {
      width: 100%;
      padding: 14px;
      border: 1px dashed rgba(124, 255, 91, 0.45);
      border-radius: 14px;
      background: rgba(2, 6, 23, 0.75);
      color: #cbd5e1;
      margin-top: 12px;
    }

    button {
      width: 100%;
      padding: 15px 20px;
      background: linear-gradient(135deg, #7CFF5B, #22c55e);
      border: none;
      color: #02130a;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      margin-top: 14px;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(34,197,94,0.28);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    img {
      max-width: 100%;
      margin-top: 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .result {
      margin-top: 18px;
      background: rgba(2, 6, 23, 0.86);
      border: 1px solid rgba(124, 255, 91, 0.25);
      padding: 18px;
      border-radius: 18px;
      text-align: left;
      white-space: pre-line;
      color: #e2e8f0;
      line-height: 1.5;
    }

    .paywall {
      margin-top: 20px;
      background: rgba(34, 197, 94, 0.10);
      border: 1px solid rgba(124, 255, 91, 0.35);
      padding: 18px;
      border-radius: 18px;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .feature {
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 12px 8px;
      font-size: 13px;
      color: #cbd5e1;
    }

    .hidden {
      display: none;
    }

    .small {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 16px;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="logo">📸 Tik<span>Cal</span></div>

  <h1>
    Snap. Analyze.<br>
    <span class="green">Know Your Calories.</span>
  </h1>

  <p>No typing. No guessing. Upload a meal photo and get instant calorie & macro estimates.</p>

  <div class="features">
    <div class="feature">📷 Snap</div>
    <div class="feature">🧠 AI Analyze</div>
    <div class="feature">📊 Results</div>
  </div>

  <div class="card">
    <input type="file" id="imageInput" accept="image/*" />
    <button onclick="analyze()">Analyze Meal</button>

    <img id="preview" class="hidden" />

    <div id="result" class="result hidden"></div>

    <div id="paywall" class="paywall hidden">
      <p>⚠️ Free limit reached</p>
      <button onclick="window.location.href='https://buy.stripe.com/aFa7sL9YgcAi7o55CC4F201'">
        Unlock Unlimited — $5
      </button>
    </div>

    <p class="small">Estimates may vary. TikCal is not medical advice.</p>
  </div>
</div>

<script>
let scans = Number(localStorage.getItem("tikcal_scans") || 0);
let unlocked = localStorage.getItem("tikcal_unlocked") === "true";

if (window.location.search.includes("success=1")) {
  unlocked = true;
  localStorage.setItem("tikcal_unlocked", "true");
  alert("Payment successful! Unlimited scans unlocked.");
  window.history.replaceState({}, document.title, window.location.pathname);
}

async function analyze() {
  const file = document.getElementById("imageInput").files[0];

  if (!file) {
    alert("Upload an image");
    return;
  }

  if (!unlocked && scans >= 3) {
    document.getElementById("paywall").classList.remove("hidden");
    return;
  }

  scans++;
  localStorage.setItem("tikcal_scans", scans);

  const reader = new FileReader();

  reader.onload = async function(e) {
    const base64Image = e.target.result;

    const preview = document.getElementById("preview");
    preview.src = base64Image;
    preview.classList.remove("hidden");

    const resultBox = document.getElementById("result");
    resultBox.classList.remove("hidden");
    resultBox.innerText = "Analyzing...";

    try {
      const response = await fetch("/api/analyze", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          image: base64Image
        })
      });

      const data = await response.json();

      resultBox.innerText = data.result || "Error analyzing image";

    } catch (error) {
      resultBox.innerText = "Error connecting to server";
    }
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
